version: "3.8"

services:
  self-hosted-telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: self-hosted-telegram-bot-api
    restart: unless-stopped

    networks:
      - coolify
      - internal

    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: ${TELEGRAM_LOCAL:-1}

    volumes:
      - self-hosted-telegram-bot-api-data:/var/lib/self-hosted-telegram-bot-api

    ports:
      - "8081:8081"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  self-hosted-telegram-bot-api-data:
    driver: local

networks:
  internal:
    driver: bridge
  coolify:
    external: true
